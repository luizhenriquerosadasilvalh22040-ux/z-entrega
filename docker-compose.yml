version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: trazpraca-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    command: mongod --replSet rs0 --bind_ip_all
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: trazpraca-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: always

volumes:
  mongodb_data:
  redis_data:
